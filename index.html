<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NCLEX 7 Day Training — 重點整理</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <!-- ═══════════════ HERO ═══════════════ -->
        <div class="hero">
            <h1>📚 NCLEX 7 Day Training — 重點整理</h1>
            <p>NCLEX Crusade International 出品・由批判性思維到優先順序，系統性攻略 NCLEX</p>
            <div class="hero-meta">
                <span class="badge">頻道 <span>NCLEX Crusade International</span></span>
                <span class="badge">共 <span>7 天</span> 訓練</span>
                <span class="badge">總時長 <span>約 9 小時</span></span>
                <span class="badge">直播日期 <span>2022.03</span></span>
            </div>
        </div>

        <!-- ═══════════════ NAV ═══════════════ -->
        <div class="nav-wrap">
            <nav class="nav">
                <a href="#overview" class="active">總覽</a>
                <a href="#day1">Day 1</a>
                <a href="#day2">Day 2</a>
                <a href="#day3">Day 3</a>
                <a href="#day4">Day 4</a>
                <a href="#day5">Day 5</a>
                <a href="#day6">Day 6</a>
                <a href="#day7">Day 7</a>
                <a href="#core">核心精華</a>
            </nav>
        </div>

        <!-- ═══════════════ MAIN CONTENT (rendered by JS) ═══════════════ -->
        <div class="container" id="main"></div>

        <script src="data.js"></script>
        <script>
            function renderOverview(rows) {
                const trs = rows.map(r => `
                    <tr>
                        <td><span class="day-pill">${r.pill}</span></td>
                        <td>${r.topic}</td>
                        <td>${r.duration}</td>
                        <td><a class="yt-link" href="${r.url}" target="_blank">▶ YouTube</a></td>
                    </tr>`).join('');
                return `
                    <section id="overview">
                        <h2 class="section-heading">🗂 系列總覽</h2>
                        <table class="summary-table">
                            <thead><tr><th>影片</th><th>主題</th><th>時長</th><th>連結</th></tr></thead>
                            <tbody>${trs}</tbody>
                        </table>
                    </section>`;
            }

            function renderCard(card) {
                const items = card.items.map(i => `<li>${i}</li>`).join('');
                return `
                    <div class="card${card.wide ? ' wide' : ''}">
                        <div class="card-title">${card.title}</div>
                        <ul>${items}</ul>
                    </div>`;
            }

            function renderDay(day) {
                const cards = day.cards.map(renderCard).join('');
                const quote = day.quote
                    ? `<blockquote>「${day.quote.text}」<cite>${day.quote.cite}</cite></blockquote>`
                    : '';
                return `
                    <section id="${day.id}" class="day-section ${day.cls}">
                        <div class="day-header">
                            <div class="day-icon">${day.icon}</div>
                            <div class="day-header-text">
                                <h2>${day.title}</h2>
                                <span class="meta">${day.duration} · ${day.date} · <a class="yt-link" href="${day.url}" target="_blank">▶ 觀看影片</a></span>
                            </div>
                        </div>
                        <div class="card-grid">${cards}</div>
                        ${quote}
                    </section>`;
            }

            function renderCore(core) {
                const rows = core.principles
                    .map(p => `<tr><td>${p.label}</td><td>${p.content}</td></tr>`)
                    .join('');
                return `
                    <section id="core">
                        <h2 class="section-heading">🗝️ 整個系列核心精華</h2>
                        <div class="card" style="margin-bottom: 24px">
                            <table class="principles">${rows}</table>
                        </div>
                        <div class="highlight-box"><strong>備考建議：</strong> ${core.highlight}</div>
                    </section>`;
            }

            function render() {
                const divider = '<hr class="divider" />';
                const days = DATA.days.map(renderDay).join(divider);
                document.getElementById('main').innerHTML =
                    renderOverview(DATA.overview) + divider + days + divider + renderCore(DATA.core);
                initScrollObserver();
            }

            function initScrollObserver() {
                const sections = document.querySelectorAll('section[id]');
                const navLinks = document.querySelectorAll('.nav a');
                const observer = new IntersectionObserver(
                    (entries) => {
                        entries.forEach((e) => {
                            if (e.isIntersecting) {
                                navLinks.forEach(a => a.classList.remove('active'));
                                const active = document.querySelector(`.nav a[href="#${e.target.id}"]`);
                                if (active) active.classList.add('active');
                            }
                        });
                    },
                    { rootMargin: '-40% 0px -55% 0px' }
                );
                sections.forEach(s => observer.observe(s));
            }

            render();
        </script>
    </body>
</html>
